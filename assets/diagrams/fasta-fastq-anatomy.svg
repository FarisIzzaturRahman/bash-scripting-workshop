<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="440" fill="#0d1117"/>
  <text x="380" y="34" fill="#e6edf3" font-size="20" font-weight="700" text-anchor="middle">Anatomi FASTA vs FASTQ</text>

  <!-- FASTA box -->
  <text x="40" y="78" fill="#7ee787" font-size="16" font-weight="700">📄 FASTA — sekuens saja</text>
  <rect x="40" y="92" width="680" height="110" rx="8" fill="#161b22" stroke="#30363d"/>

  <text x="60" y="124" fill="#79c0ff" font-size="14" font-family="monospace">&gt;seq001|Homo_sapiens|BRCA1|chr17</text>
  <rect x="56" y="110" width="14" height="18" fill="none" stroke="#f78166" stroke-width="1.5"/>
  <text x="60" y="146" fill="#e6edf3" font-size="14" font-family="monospace">ATGGATTTATCTGCTCTTCGCGTTGAAGAAGTACAA</text>
  <text x="60" y="166" fill="#e6edf3" font-size="14" font-family="monospace">AATGTCATTAATGCTATGCAGAAAATCTTAGAGTGT</text>

  <text x="430" y="124" fill="#f78166" font-size="11">← header diawali "&gt;"</text>
  <text x="430" y="156" fill="#8b949e" font-size="11">← baris sekuens (DNA/RNA/protein)</text>

  <!-- FASTQ box -->
  <text x="40" y="246" fill="#7ee787" font-size="16" font-weight="700">🧪 FASTQ — sekuens + kualitas (4 baris per read)</text>
  <rect x="40" y="260" width="680" height="150" rx="8" fill="#161b22" stroke="#30363d"/>

  <!-- line numbers -->
  <text x="56" y="292" fill="#6e7681" font-size="13" font-family="monospace">1</text>
  <text x="56" y="316" fill="#6e7681" font-size="13" font-family="monospace">2</text>
  <text x="56" y="340" fill="#6e7681" font-size="13" font-family="monospace">3</text>
  <text x="56" y="364" fill="#6e7681" font-size="13" font-family="monospace">4</text>

  <text x="80" y="292" fill="#79c0ff" font-size="14" font-family="monospace">@read001</text>
  <text x="80" y="316" fill="#e6edf3" font-size="14" font-family="monospace">GATCGGAAGAGCACACGTCTGAACTCCAGTCAC</text>
  <text x="80" y="340" fill="#d2a8ff" font-size="14" font-family="monospace">+</text>
  <text x="80" y="364" fill="#ffa657" font-size="14" font-family="monospace">IIIIIIIIIIIIIII?????55555!!!!!</text>

  <text x="470" y="292" fill="#f78166" font-size="11">← header (diawali "@")</text>
  <text x="470" y="316" fill="#8b949e" font-size="11">← sekuens</text>
  <text x="470" y="340" fill="#d2a8ff" font-size="11">← pemisah (diawali "+")</text>
  <text x="470" y="364" fill="#ffa657" font-size="11">← skor kualitas (Phred)</text>

  <text x="80" y="394" fill="#6e7681" font-size="11" font-family="monospace">tinggi────────────menengah──rendah</text>
</svg>

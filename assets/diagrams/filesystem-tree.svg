<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="430" fill="#0D1117"/>
  <text x="380" y="40" fill="#E6EDF3" font-size="22" font-weight="700" text-anchor="middle">Sistem File Linux itu Sebuah Pohon</text>
  <text x="380" y="66" fill="#8B949E" font-size="13" text-anchor="middle">Semua dimulai dari akar  /  (root)</text>

  <!-- root -->
  <rect x="345" y="90" width="70" height="40" rx="8" fill="#0E2A16" stroke="#7EE787" stroke-width="2"/>
  <text x="380" y="116" fill="#7EE787" font-family="Consolas, monospace" font-size="22" font-weight="700" text-anchor="middle">/</text>

  <!-- level 1 connectors -->
  <path d="M380 130 L380 150 M150 150 L610 150 M150 150 L150 168 M380 150 L380 168 M610 150 L610 168" stroke="#30363D" stroke-width="1.5" fill="none"/>

  <!-- bin -->
  <rect x="95" y="170" width="110" height="38" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="150" y="194" fill="#56D4DD" font-family="Consolas, monospace" font-size="15" text-anchor="middle">/bin</text>
  <!-- etc -->
  <rect x="325" y="170" width="110" height="38" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="380" y="194" fill="#56D4DD" font-family="Consolas, monospace" font-size="15" text-anchor="middle">/etc</text>
  <!-- home -->
  <rect x="555" y="170" width="110" height="38" rx="6" fill="#1C2A12" stroke="#4EAA25" stroke-width="1.5"/>
  <text x="610" y="194" fill="#7EE787" font-family="Consolas, monospace" font-size="15" text-anchor="middle">/home</text>

  <text x="150" y="226" fill="#6E7681" font-size="11" text-anchor="middle">program sistem</text>
  <text x="380" y="226" fill="#6E7681" font-size="11" text-anchor="middle">konfigurasi</text>
  <text x="610" y="226" fill="#8B949E" font-size="11" text-anchor="middle">folder pengguna</text>

  <!-- home -> user -->
  <path d="M610 208 L610 240 L610 240" stroke="#30363D" stroke-width="1.5" fill="none"/>
  <rect x="540" y="242" width="140" height="38" rx="6" fill="#1C2A12" stroke="#4EAA25" stroke-width="1.5"/>
  <text x="610" y="266" fill="#7EE787" font-family="Consolas, monospace" font-size="14" text-anchor="middle">/home/peneliti</text>
  <text x="610" y="298" fill="#F0B429" font-size="12" text-anchor="middle" font-weight="700">≡ ~  (home kamu)</text>

  <!-- user -> projects -->
  <path d="M610 280 L610 320 M470 320 L680 320 M470 320 L470 338 M610 320 L610 338 M680 320 L680 338" stroke="#30363D" stroke-width="1.5" fill="none"/>
  <rect x="415" y="340" width="110" height="36" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="470" y="363" fill="#C9D1D9" font-family="Consolas, monospace" font-size="13" text-anchor="middle">data/</text>
  <rect x="555" y="340" width="110" height="36" rx="6" fill="#161B22" stroke="#30363D"/>
  <text x="610" y="363" fill="#C9D1D9" font-family="Consolas, monospace" font-size="13" text-anchor="middle">results/</text>
  <rect x="628" y="340" width="108" height="36" rx="6" fill="#161B22" stroke="#30363D" opacity="0"/>

  <!-- legend left -->
  <rect x="70" y="280" width="300" height="120" rx="10" fill="#161B22" stroke="#30363D"/>
  <text x="90" y="306" fill="#E6EDF3" font-size="14" font-weight="700">Navigasi cepat</text>
  <text x="90" y="332" font-family="Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#7EE787">cd ~</tspan><tspan fill="#8B949E" dx="14">→  ke home</tspan></text>
  <text x="90" y="354" font-family="Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#7EE787">cd /</tspan><tspan fill="#8B949E" dx="14">→  ke root</tspan></text>
  <text x="90" y="376" font-family="Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#7EE787">cd ..</tspan><tspan fill="#8B949E" dx="14">→  naik 1 tingkat</tspan></text>
  <text x="90" y="394" font-family="Consolas, monospace" font-size="12"><tspan fill="#8B949E">  </tspan></text>
</svg>

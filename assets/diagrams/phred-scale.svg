<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="320" fill="#0D1117"/>
  <text x="380" y="42" fill="#E6EDF3" font-size="22" font-weight="700" text-anchor="middle">Skala Kualitas Phred (FASTQ)</text>
  <text x="380" y="68" fill="#8B949E" font-size="13" text-anchor="middle">Makin tinggi skornya, makin akurat pembacaan basa</text>

  <defs>
    <linearGradient id="qual" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F85149"/>
      <stop offset="35%" stop-color="#F0B429"/>
      <stop offset="70%" stop-color="#7EE787"/>
      <stop offset="100%" stop-color="#2EA043"/>
    </linearGradient>
  </defs>
  <rect x="80" y="100" width="600" height="34" rx="6" fill="url(#qual)"/>
  <text x="80" y="156" fill="#F85149" font-size="12" font-weight="700">rendah</text>
  <text x="680" y="156" fill="#2EA043" font-size="12" font-weight="700" text-anchor="end">tinggi</text>

  <!-- markers -->
  <g font-family="Consolas, monospace">
    <!-- Q10 -->
    <line x1="170" y1="96" x2="170" y2="138" stroke="#E6EDF3" stroke-width="1.5"/>
    <text x="170" y="190" fill="#E6EDF3" font-size="15" font-weight="700" text-anchor="middle">Q10</text>
    <text x="170" y="212" fill="#8B949E" font-size="12" text-anchor="middle">ASCII: +</text>
    <text x="170" y="232" fill="#8B949E" font-size="12" text-anchor="middle">90%</text>
    <text x="170" y="250" fill="#6E7681" font-size="11" text-anchor="middle">1 / 10</text>

    <!-- Q20 -->
    <line x1="330" y1="96" x2="330" y2="138" stroke="#E6EDF3" stroke-width="1.5"/>
    <text x="330" y="190" fill="#E6EDF3" font-size="15" font-weight="700" text-anchor="middle">Q20</text>
    <text x="330" y="212" fill="#8B949E" font-size="12" text-anchor="middle">ASCII: 5</text>
    <text x="330" y="232" fill="#8B949E" font-size="12" text-anchor="middle">99%</text>
    <text x="330" y="250" fill="#6E7681" font-size="11" text-anchor="middle">1 / 100</text>

    <!-- Q30 -->
    <line x1="490" y1="96" x2="490" y2="138" stroke="#0D1117" stroke-width="1.5"/>
    <text x="490" y="190" fill="#7EE787" font-size="15" font-weight="700" text-anchor="middle">Q30</text>
    <text x="490" y="212" fill="#8B949E" font-size="12" text-anchor="middle">ASCII: ?</text>
    <text x="490" y="232" fill="#7EE787" font-size="12" text-anchor="middle" font-weight="700">99.9%</text>
    <text x="490" y="250" fill="#6E7681" font-size="11" text-anchor="middle">1 / 1.000</text>

    <!-- Q40 -->
    <line x1="640" y1="96" x2="640" y2="138" stroke="#0D1117" stroke-width="1.5"/>
    <text x="640" y="190" fill="#2EA043" font-size="15" font-weight="700" text-anchor="middle">Q40</text>
    <text x="640" y="212" fill="#8B949E" font-size="12" text-anchor="middle">ASCII: I</text>
    <text x="640" y="232" fill="#2EA043" font-size="12" text-anchor="middle" font-weight="700">99.99%</text>
    <text x="640" y="250" fill="#6E7681" font-size="11" text-anchor="middle">1 / 10.000</text>
  </g>

  <rect x="80" y="272" width="600" height="34" rx="8" fill="#161B22" stroke="#30363D"/>
  <text x="380" y="294" text-anchor="middle" font-family="Consolas, monospace" font-size="14"><tspan fill="#8B949E">rumus:  </tspan><tspan fill="#7EE787">Q = -10 × log₁₀(P)</tspan><tspan fill="#8B949E">   ·   P = probabilitas error</tspan></text>
</svg>
